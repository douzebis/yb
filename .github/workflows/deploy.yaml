name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Copy docs into website/content
        run: |
          set -e

          inject() {
            local src="$1" dst="$2"
            local title
            title=$(grep -m1 '^# ' "$src" | sed 's/^# //' || basename "$src" .md)
            printf '+++\ntitle = "%s"\n+++\n\n' "$title" > "$dst"
            cat "$src" >> "$dst"
          }

          # README → readme.md
          inject README.md website/content/readme.md

          # docs/*.md (excluding specs/ subdir)
          for f in docs/*.md; do
            name=$(basename "$f" .md | tr '[:upper:]' '[:lower:]' | tr '_' '-')
            inject "$f" "website/content/${name}.md"
          done

          # rust/docs/DESIGN.md → design.md
          inject rust/docs/DESIGN.md website/content/design.md

          # docs/specs/*.md (skipping 0000-template)
          mkdir -p website/content/specs
          for f in docs/specs/[0-9]*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .md)
            [ "$name" = "0000-template" ] && continue
            inject "$f" "website/content/specs/${name}.md"
          done

      - name: Build
        run: cd website && zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
