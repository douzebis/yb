name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate man pages
        run: |
          mkdir -p man/man1
          cargo run --release -p yb --bin yb-gen-man -- man/man1

      - name: Copy docs into website/content
        run: |
          set -e

          inject() {
            local src="$1" dst="$2"
            local title
            title=$(grep -m1 '^# ' "$src" | sed 's/^# //' || basename "$src" .md)
            printf '+++\ntitle = "%s"\n+++\n\n' "$title" > "$dst"
            cat "$src" >> "$dst"
          }

          # README → readme.md
          inject README.md website/content/readme.md

          # docs/*.md (excluding specs/ subdir)
          for f in docs/*.md; do
            name=$(basename "$f" .md | tr '[:upper:]' '[:lower:]' | tr '_' '-')
            inject "$f" "website/content/${name}.md"
          done

          # rust/docs/DESIGN.md → design.md
          inject rust/docs/DESIGN.md website/content/design.md

          # docs/specs/*.md (skipping 0000-template)
          mkdir -p website/content/specs
          for f in docs/specs/[0-9]*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .md)
            [ "$name" = "0000-template" ] && continue
            inject "$f" "website/content/specs/${name}.md"
          done

          # man pages → website/content/man-pages.md
          # Render each .1 page to HTML with mandoc, embed in a Zola page.
          {
            printf '+++\ntitle = "Man Pages"\n+++\n\n'
            printf '# yb man pages\n\n'
            for page in yb yb-format yb-store yb-fetch yb-list yb-remove yb-fsck yb-list-readers yb-select; do
              f="man/man1/${page}.1"
              [ -f "$f" ] || continue
              printf '<h2 id="%s"><code>%s(1)</code></h2>\n\n' "$page" "$page"
              printf '<div class="manpage">\n'
              mandoc -T html -O fragment "$f" 2>/dev/null || cat "$f"
              printf '</div>\n\n'
            done
          } > website/content/man-pages.md

      - name: Build
        run: cd website && zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
