name: Nix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast gates: formatting, lints, tier-1 unit tests.
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-15
          - os: macos-15-intel
            skip-clippy: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Check formatting (rustfmt)
        run: nix-build -A rust-fmt

      - name: Check lints (clippy)
        if: ${{ !matrix.skip-clippy }}
        run: nix-build -A rust-clippy

      - name: Run unit tests (tier-1)
        run: nix-build -A rust-tests

  # Build the release binary.
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-15-intel
          - os: macos-15
    runs-on: ${{ matrix.os }}
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Build yb binary
        run: nix-build -A yb-rust

  # Integration tests: NixOS VM with pcscd + vsmartcard + piv-authenticator.
  # Linux only: requires KVM.
  integration:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            system-features = nixos-test kvm

      - name: Run integration tests (tier-1 + tier-2, NixOS VM)
        run: nix-build -A integration-tests
