{% macro styles() %}
<style>
    :root {
        --bg: #ffffff;
        --fg: #222222;
        --heading: #111111;
        --link: #0366d6;
        --code-bg: #f6f8fa;
        --border: #dddddd;
        --hr: #eeeeee;
        --nav: #555555;
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --bg: #0d1117;
            --fg: #c9d1d9;
            --heading: #e6edf3;
            --link: #58a6ff;
            --code-bg: #161b22;
            --border: #30363d;
            --hr: #21262d;
            --nav: #8b949e;
        }
    }
    body { font-family: sans-serif; max-width: 860px; margin: 2em auto; padding: 0 1em; color: var(--fg); background: var(--bg); }
    h1, h2, h3 { color: var(--heading); }
    a { color: var(--link); }
    pre { background: var(--code-bg); padding: 1em; border-radius: 4px; overflow-x: auto; }
    code { background: var(--code-bg); padding: .15em .3em; border-radius: 3px; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid var(--border); padding: .5em .75em; }
    th { background: var(--code-bg); }
    hr { border: none; border-top: 1px solid var(--hr); margin: 2em 0; }
    nav { margin-bottom: 2em; font-size: .9em; color: var(--nav); }
    nav a { color: var(--link); }
</style>
{% endmacro %}
